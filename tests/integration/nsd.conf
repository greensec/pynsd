server:
  ip-address: 0.0.0.0
  port: 5353
  chroot: ""
  username: ""
  zonesdir: "/zones/static"
  zonelistfile: "/runtime/state/zone.list"
  database: "/runtime/state/nsd.db"
  xfrdfile: "/runtime/state/xfrd.state"
  xfrdir: "/runtime/state"
  pidfile: "/runtime/state/nsd.pid"

zone:
  name: "example.com"
  zonefile: "example.com.zone"

pattern:
  name: "dynamic-primary"
  zonefile: "/runtime/zones/dynamic/%s.zone"

remote-control:
  control-enable: yes
  control-interface: 0.0.0.0
  control-port: 8952
  server-key-file: "/runtime/certs/nsd_server.key"
  server-cert-file: "/runtime/certs/nsd_server.pem"
  control-key-file: "/runtime/certs/nsd_control.key"
  control-cert-file: "/runtime/certs/nsd_control.pem"
